{% extends "base.html" %}

{% block title %}
Add User
{% endblock %}

{% block content %}

<h2>Add User</h2>

<form method="post">

<p>
<label>Username</label><br>
<input type="text"
       name="username"
       required>
</p>

<p>
<label>Password</label><br>
<input type="password"
       name="password"
       required>
</p>

<p>
<label>Role</label><br>

<select name="role">

    <option value="faculty">Faculty</option>

    <option value="reviewer">Reviewer</option>

    <option value="admin">Admin</option>

</select>

</p>

<p>

<button type="submit">

Create User

</button>

</p>

</form>

<p>

<a href="/admin/users">

← Back to Users

</a>

</p>

{% endblock %}
