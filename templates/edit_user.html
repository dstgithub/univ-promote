{% extends "base.html" %}

{% block title %}
Edit User
{% endblock %}

{% block content %}

<h2>Edit User</h2>

<form method="post">

<p>
<label>Username</label><br>

<input
    type="text"
    value="{{ user.username }}"
    readonly>
</p>

<p>
<label>Password</label><br>

<input
    type="text"
    name="password"
    value="{{ user.password }}"
    required>
</p>

<p>
<label>Role</label><br>

<select name="role">

    <option value="faculty"
        {% if user.role == "faculty" %}selected{% endif %}>
        Faculty
    </option>

    <option value="reviewer"
        {% if user.role == "reviewer" %}selected{% endif %}>
        Reviewer
    </option>

    <option value="admin"
        {% if user.role == "admin" %}selected{% endif %}>
        Admin
    </option>

</select>

</p>

<p>

<button type="submit">

Save Changes

</button>

</p>

</form>

<p>
<a href="/admin/users">
← Back to Users
</a>
</p>

{% endblock %}
